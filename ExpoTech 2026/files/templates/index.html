<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowStudy | Planejador de Estudos Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#fafafa;color:#111;line-height:1.5}
        .container{max-width:1100px;margin:0 auto;padding:32px 24px}
        h1{font-size:28px;font-weight:600;letter-spacing:-.02em}
        h2{font-size:18px;font-weight:500;margin-bottom:16px}
        h3{font-size:15px;font-weight:600;margin-bottom:12px;color:#0a0a0a}
        .card{background:#fff;border:1px solid #ececec;border-radius:14px;padding:24px;transition:all .2s ease;margin-bottom:18px}
        .card:hover{border-color:#dcdcdc}
        .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
        label{display:block;font-size:13px;font-weight:500;color:#444;margin-bottom:6px}
        input,select{width:100%;padding:10px 12px;border:1px solid #e1e1e1;border-radius:8px;font-size:14px;background:#fff;font-family:inherit;transition:border .15s}
        input:focus,select:focus{outline:none;border-color:#111}
        .field{margin-bottom:14px}
        .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border:none;border-radius:8px;background:#111;color:#fff;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
        .btn:hover{background:#000}
        .btn:disabled{opacity:.5;cursor:not-allowed}
        .btn-ghost{background:transparent;color:#111;border:1px solid #e1e1e1}
        .btn-ghost:hover{background:#f5f5f5}
        .btn-danger{background:#e11}
        .btn-danger:hover{background:#c00}
        .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
        .pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;background:#f3f3f3;padding:4px 10px;border-radius:999px;color:#555}
        .toast{position:fixed;top:16px;right:16px;background:#111;color:#fff;padding:12px 18px;border-radius:10px;font-size:14px;box-shadow:0 4px 18px rgba(0,0,0,.15);opacity:0;transform:translateY(-8px);transition:all .2s;z-index:99}
        .toast.show{opacity:1;transform:translateY(0)}
        .toast.error{background:#c11}
        .toast.success{background:#0a7}
        .subject-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border:1px solid #ececec;border-radius:10px;margin-bottom:8px;background:#fff}
        .subject-meta{display:flex;gap:14px;font-size:12px;color:#666;margin-top:4px}
        .empty{text-align:center;padding:32px 12px;color:#888;font-size:14px}
        .tabs{display:flex;gap:6px;border-bottom:1px solid #eee;margin-bottom:18px}
        .tab{padding:10px 14px;cursor:pointer;font-size:14px;color:#666;border-bottom:2px solid transparent;font-weight:500}
        .tab.active{color:#111;border-color:#111}
        .hidden{display:none}
        .auth-wrap{max-width:420px;margin:60px auto}
        .auth-toggle{text-align:center;margin-top:12px;font-size:13px;color:#666}
        .auth-toggle a{color:#111;font-weight:500;cursor:pointer;text-decoration:underline}
        .day-block{margin-bottom:16px}
        .day-title{font-size:14px;font-weight:600;margin-bottom:8px;color:#111}
        .plan-row{display:flex;justify-content:space-between;padding:8px 12px;background:#f7f7f7;border-radius:6px;margin-bottom:4px;font-size:13px}
        .plan-row .min{color:#666;font-variant-numeric:tabular-nums}
        @media(max-width:640px){.grid-2,.grid-3{grid-template-columns:1fr}}
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- ========== LOGIN / REGISTER ========== -->
<div id="authScreen" class="container">
    <div class="auth-wrap">
        <h1 style="text-align:center;margin-bottom:8px">FlowStudy</h1>
        <p style="text-align:center;color:#666;margin-bottom:24px;font-size:14px">Planejamento de estudos personalizado</p>

        <div class="card">
            <div class="tabs">
                <div class="tab active" data-tab="login">Entrar</div>
                <div class="tab" data-tab="register">Criar conta</div>
            </div>

            <!-- Login -->
            <form id="loginForm" class="tab-panel">
                <div class="field"><label>E-mail</label><input type="email" name="email" required></div>
                <div class="field"><label>Senha</label><input type="password" name="password" required></div>
                <button class="btn" style="width:100%;justify-content:center" type="submit">Entrar</button>
            </form>

            <!-- Register -->
            <form id="registerForm" class="tab-panel hidden">
                <div class="field"><label>Nome completo</label><input type="text" name="full_name" required></div>
                <div class="field"><label>E-mail</label><input type="email" name="email" required></div>
                <div class="grid-2">
                    <div class="field"><label>Senha</label><input type="password" name="password" minlength="6" required></div>
                    <div class="field"><label>Confirme a senha</label><input type="password" name="confirm_password" minlength="6" required></div>
                </div>
                <div class="grid-2">
                    <div class="field">
                        <label>Nível</label>
                        <select name="education_level" required>
                            <option value="">Selecione</option>
                            <option>Ensino Médio</option>
                            <option>Técnico</option>
                            <option>Graduação</option>
                            <option>Pós-graduação</option>
                            <option>Concurso</option>
                            <option>Vestibular/ENEM</option>
                        </select>
                    </div>
                    <div class="field"><label>Curso / Área</label><input type="text" name="course" required placeholder="Ex.: Engenharia"></div>
                </div>
                <button class="btn" style="width:100%;justify-content:center" type="submit">Criar conta</button>
            </form>
        </div>
    </div>
</div>

<!-- ========== APP ========== -->
<div id="appScreen" class="container hidden">
    <div class="topbar">
        <div>
            <h1>FlowStudy</h1>
            <span class="pill"><i class="fa-regular fa-user"></i> <span id="userName"></span></span>
        </div>
        <button class="btn btn-ghost" id="logoutBtn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Sair</button>
    </div>

    <div class="grid-2" style="grid-template-columns:1fr 1fr;gap:18px">
        <!-- Add subject -->
        <div class="card">
            <h2><i class="fa-regular fa-square-plus"></i> Adicionar matéria</h2>
            <form id="subjectForm">
                <div class="field"><label>Nome</label><input type="text" name="name" required placeholder="Ex.: Cálculo I"></div>
                <div class="field"><label>Data da prova</label><input type="text" name="exam_date" required placeholder="dd/mm/aaaa" inputmode="numeric" maxlength="10" data-mask="date" autocomplete="off"></div>
                <div class="grid-2">
                    <div class="field">
                        <label>Dificuldade (1–5)</label>
                        <select name="difficulty" required>
                            <option value="1">1 - Fácil</option><option value="2">2</option>
                            <option value="3" selected>3 - Médio</option><option value="4">4</option>
                            <option value="5">5 - Difícil</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Prioridade (1–5)</label>
                        <select name="priority" required>
                            <option value="1">1 - Baixa</option><option value="2">2</option>
                            <option value="3" selected>3 - Média</option><option value="4">4</option>
                            <option value="5">5 - Alta</option>
                        </select>
                    </div>
                </div>
                <button class="btn" type="submit"><i class="fa-solid fa-plus"></i> Adicionar</button>
            </form>
        </div>

        <!-- Generate plan -->
        <div class="card">
            <h2><i class="fa-regular fa-calendar-check"></i> Gerar plano</h2>
            <form id="planForm">
                <div class="field"><label>Horas por dia (0.5 – 16)</label><input type="number" step="0.5" min="0.5" max="16" name="hours_per_day" value="3" required></div>
                <div class="field"><label>Dias por semana (1 – 7)</label><input type="number" min="1" max="7" name="days_per_week" value="5" required></div>
                <button class="btn" type="submit"><i class="fa-solid fa-wand-magic-sparkles"></i> Gerar plano</button>
            </form>
        </div>
    </div>

    <div class="card">
        <h2><i class="fa-regular fa-rectangle-list"></i> Minhas matérias</h2>
        <div id="subjectsList"><div class="empty">Carregando...</div></div>
    </div>

    <div class="card">
        <h2><i class="fa-regular fa-calendar"></i> Plano da semana</h2>
        <div id="planView"><div class="empty">Nenhum plano gerado ainda.</div></div>
    </div>
</div>

<script>
const API = '/api';
let userId = null;
let userName = null;

const toastEl = document.getElementById('toast');
function toast(msg, type='info'){
    toastEl.textContent = msg;
    toastEl.className = 'toast ' + type + ' show';
    setTimeout(()=>toastEl.classList.remove('show'), 2800);
}

function authHeaders(){
    const h = {'Content-Type':'application/json'};
    if(userId !== null) h['X-User-Id'] = userId;
    return h;
}

async function api(path, opts={}){
    const res = await fetch(API + path, {headers: authHeaders(), ...opts});
    const body = await res.json().catch(()=>({ok:false,error:'Resposta inválida'}));
    if(!res.ok || body.ok === false) throw new Error(body.error || ('HTTP ' + res.status));
    return body;
}

// ---------- Auth UI ----------
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('loginForm').classList.toggle('hidden', t.dataset.tab!=='login');
    document.getElementById('registerForm').classList.toggle('hidden', t.dataset.tab!=='register');
}));

document.getElementById('loginForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    try{
        const body = await api('/login', {method:'POST', body: JSON.stringify(Object.fromEntries(fd))});
        onAuth(body.user);
    }catch(err){ toast(err.message,'error'); }
});

document.getElementById('registerForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    try{
        const body = await api('/register', {method:'POST', body: JSON.stringify(Object.fromEntries(fd))});
        onAuth(body.user);
        toast('Conta criada!','success');
    }catch(err){ toast(err.message,'error'); }
});

document.getElementById('logoutBtn').addEventListener('click', ()=>{
    userId = null; userName = null;
    localStorage.removeItem('fs_user');
    document.getElementById('authScreen').classList.remove('hidden');
    document.getElementById('appScreen').classList.add('hidden');
});

function onAuth(user){
    userId = user.id;
    userName = user.full_name;
    localStorage.setItem('fs_user', JSON.stringify(user));
    document.getElementById('userName').textContent = user.full_name;
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('appScreen').classList.remove('hidden');
    refreshSubjects();
    refreshPlan();
}

// ---------- Subjects ----------
// Máscara dd/mm/aaaa nos inputs marcados
document.querySelectorAll('input[data-mask="date"]').forEach(inp=>{
    inp.addEventListener('input', e=>{
        let v = e.target.value.replace(/\D/g,'').slice(0,8);
        if(v.length >= 5)      v = v.slice(0,2) + '/' + v.slice(2,4) + '/' + v.slice(4);
        else if(v.length >= 3) v = v.slice(0,2) + '/' + v.slice(2);
        e.target.value = v;
    });
});

function brToIso(br){
    const m = /^(\d{2})\/(\d{2})\/(\d{4})$/.exec((br||'').trim());
    if(!m) return null;
    const [_, d, mo, y] = m;
    const iso = `${y}-${mo}-${d}`;
    const dt = new Date(iso + 'T00:00:00');
    if(isNaN(dt) || dt.getDate() !== +d || dt.getMonth()+1 !== +mo) return null;
    return iso;
}

function formatBR(iso){
    const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(iso||'');
    return m ? `${m[3]}/${m[2]}/${m[1]}` : iso;
}

document.getElementById('subjectForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const payload = Object.fromEntries(fd);
    const iso = brToIso(payload.exam_date);
    if(!iso){ toast('Data inválida. Use o formato dd/mm/aaaa.','error'); return; }
    payload.exam_date = iso;
    payload.difficulty = parseInt(payload.difficulty,10);
    payload.priority = parseInt(payload.priority,10);
    try{
        await api('/subjects', {method:'POST', body: JSON.stringify(payload)});
        e.target.reset();
        toast('Matéria adicionada','success');
        refreshSubjects();
    }catch(err){ toast(err.message,'error'); }
});

async function refreshSubjects(){
    try{
        const body = await api('/subjects');
        renderSubjects(body.subjects);
    }catch(err){ toast(err.message,'error'); }
}

function renderSubjects(items){
    const el = document.getElementById('subjectsList');
    if(!items.length){ el.innerHTML = '<div class="empty">Nenhuma matéria cadastrada.</div>'; return; }
    el.innerHTML = items.map(s=>`
        <div class="subject-row">
            <div>
                <strong>${escapeHtml(s.name)}</strong>
                <div class="subject-meta">
                    <span><i class="fa-regular fa-calendar"></i> ${formatBR(s.exam_date)}</span>
                    <span><i class="fa-solid fa-gauge"></i> Dif. ${s.difficulty}/5</span>
                    <span><i class="fa-solid fa-star"></i> Prio. ${s.priority}/5</span>
                </div>
            </div>
            <button class="btn btn-danger" data-id="${s.id}"><i class="fa-regular fa-trash-can"></i></button>
        </div>`).join('');
    el.querySelectorAll('button[data-id]').forEach(b=>b.addEventListener('click', async ()=>{
        if(!confirm('Excluir matéria?')) return;
        try{
            await api('/subjects/' + b.dataset.id, {method:'DELETE'});
            toast('Removida','success');
            refreshSubjects();
        }catch(err){ toast(err.message,'error'); }
    }));
}

// ---------- Plan ----------
document.getElementById('planForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const payload = {
        hours_per_day: parseFloat(fd.get('hours_per_day')),
        days_per_week: parseInt(fd.get('days_per_week'),10),
    };
    try{
        const body = await api('/generate-plan', {method:'POST', body: JSON.stringify(payload)});
        renderPlan(body.plan);
        toast('Plano gerado','success');
    }catch(err){ toast(err.message,'error'); }
});

async function refreshPlan(){
    try{
        const body = await api('/plan');
        renderPlan(body.plan);
    }catch(err){ /* silencioso */ }
}

function renderPlan(plan){
    const el = document.getElementById('planView');
    const days = Object.keys(plan || {});
    if(!days.length){ el.innerHTML = '<div class="empty">Nenhum plano gerado ainda.</div>'; return; }
    const dayNames = {Monday:'Segunda',Tuesday:'Terça',Wednesday:'Quarta',Thursday:'Quinta',Friday:'Sexta',Saturday:'Sábado',Sunday:'Domingo'};
    el.innerHTML = days.map(d=>`
        <div class="day-block">
            <div class="day-title">${dayNames[d]||d}</div>
            ${(plan[d]||[]).map(r=>`
                <div class="plan-row">
                    <span>${escapeHtml(r.subject_name)}</span>
                    <span class="min">${r.study_time_minutes} min</span>
                </div>
            `).join('')}
        </div>`).join('');
}

function escapeHtml(s){return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

// ---------- Restore session ----------
(function init(){
    const saved = localStorage.getItem('fs_user');
    if(saved){ try{ onAuth(JSON.parse(saved)); }catch(_){} }
})();
</script>
</body>
</html>
